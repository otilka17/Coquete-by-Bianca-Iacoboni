<!DOCTYPE html>
<html lang="ro">
<head>
    <!-- Google Tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18106516696"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'AW-18106516696');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rezervări Sesiuni Private | Coquete Bianca Iacoboni</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400;1,700&family=Cinzel:wght@400;700;900&family=Inter:wght@200;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { 
            --auriu: #c5a059; 
            --roz-pudrat: #fbf4f1; 
            --roz-accent: #f4ded6;
            --ciocolatiu: #261c19; 
            --fildes: #fffcfb; 
            --text-muted: #8c7e7a; 
            --desktop-margin: 8%;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--roz-pudrat); color: var(--ciocolatiu); font-family: 'Inter', sans-serif; overflow-x: hidden; line-height: 1.7; font-size: 16px; }

        /* SCROLL BAR */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--roz-pudrat); }
        ::-webkit-scrollbar-thumb { background: var(--auriu); border-radius: 2px; }

        /* HEADER PREMIUM */
        .site-header { position: fixed; top: 0; width: 100%; z-index: 9999; padding: 25px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(251, 244, 241, 0.95); backdrop-filter: blur(5px); border-bottom: 1px solid var(--roz-accent); }
        @media (min-width: 1024px) { .site-header { padding: 20px var(--desktop-margin); } }
        
        .brand-logo { font-family: 'Cinzel'; font-size: 1.4rem; font-weight: 700; color: var(--ciocolatiu); text-decoration: none; letter-spacing: 4px; }
        .brand-logo span { color: var(--auriu); }
        
        .btn-back { font-family: 'Cinzel'; text-decoration: none; color: var(--ciocolatiu); font-size: 0.8rem; letter-spacing: 2px; font-weight: 700; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-back:hover { color: var(--auriu); }

        /* HERO CU IMAGINE BLURATĂ AMBIENTAL */
        .booking-hero { 
            position: relative; 
            padding: 160px 5% 80px; 
            text-align: center; 
            background: var(--ciocolatiu);
            overflow: hidden;
        }
        .booking-hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('./IMG_20260518_100615.jpg');
            background-size: cover;
            background-position: center center;
            filter: blur(8px) opacity(0.2);
            z-index: 0;
        }
        .hero-inside { position: relative; z-index: 1; }
        .booking-hero span { font-family: 'Cinzel'; color: var(--auriu); font-size: 0.8rem; letter-spacing: 5px; display: block; margin-bottom: 15px; font-weight: 700; text-transform: uppercase; }
        .booking-hero h1 { font-family: 'Playfair Display'; font-size: clamp(2.2rem, 5vw, 3.8rem); font-style: italic; color: var(--fildes); font-weight: 400; line-height: 1.2; }

        /* WRAPPER FORMULAR DE REZERVARE */
        .booking-wrapper { max-width: 800px; margin: 0 auto; padding: 60px 5% 120px; }

        .booking-card { background: var(--fildes); border: 1px solid var(--roz-accent); padding: 40px 30px; border-radius: 16px; box-shadow: 0 20px 40px rgba(38,28,25,0.02); }
        .booking-card h2 { font-family: 'Playfair Display'; font-style: italic; font-size: 1.7rem; color: var(--ciocolatiu); font-weight: 400; margin-bottom: 30px; border-left: 2px solid var(--auriu); padding-left: 15px; }

        /* PAȘI REZERVARE */
        .form-group { margin-bottom: 25px; display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-family: 'Cinzel'; font-size: 0.75rem; letter-spacing: 2px; color: var(--ciocolatiu); font-weight: 700; text-transform: uppercase; }

        /* SELECTORI ȘI INPUTURI */
        .form-select, .form-input, .form-textarea { 
            width: 100%; 
            background: var(--roz-pudrat); 
            border: 1px solid rgba(197, 160, 89, 0.2); 
            padding: 15px; 
            border-radius: 8px; 
            color: var(--ciocolatiu); 
            font-family: 'Inter', sans-serif; 
            font-size: 100%;
            outline: none;
            transition: 0.3s;
        }
        .form-select:focus, .form-input:focus, .form-textarea:focus { border-color: var(--auriu); background: var(--fildes); }
        .form-textarea { height: 120px; resize: vertical; }

        /* GRID PENTRU DATĂ ȘI ORĂ EXCLUSIVĂ */
        .date-time-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 600px) { .date-time-grid { grid-template-columns: 1fr 1fr; } }

        /* BUTON REZERVARE */
        .btn-submit-booking { 
            background: var(--ciocolatiu); 
            color: var(--fildes); 
            font-family: 'Cinzel'; 
            font-size: 0.85rem; 
            font-weight: 700; 
            letter-spacing: 3px; 
            padding: 18px 35px; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            transition: 0.4s; 
            box-shadow: 0 10px 20px rgba(38,28,25,0.1); 
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-submit-booking:hover:not(:disabled) { background: var(--auriu); transform: translateY(-2px); }
        .btn-submit-booking:disabled { opacity: 0.6; cursor: not-allowed; }

        /* NOTIFICARE REZERVARE FINĂ (FĂRĂ ALERT DE SYSTEM) */
        #customToast { 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            z-index: 10000; 
            transform: translateY(120px); 
            opacity: 0; 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            background: var(--ciocolatiu); 
            color: var(--fildes); 
            border: 1px solid var(--auriu); 
            padding: 20px 25px; 
            border-radius: 12px; 
            box-shadow: 0 20px 50px rgba(38,28,25,0.15); 
            max-width: 380px; 
            display: flex; 
            align-items: start; 
            gap: 15px;
        }
        #customToast.show { transform: translateY(0); opacity: 1; }
        .toast-icon { color: var(--auriu); font-size: 1.3rem; }
        .toast-content h4 { font-family: 'Cinzel'; font-size: 0.75rem; letter-spacing: 2px; color: var(--auriu); margin-bottom: 5px; }
        .toast-content p { font-size: 0.85rem; font-weight: 300; line-height: 1.5; color: var(--roz-pudrat); }

        /* ELEMENT ROTATIV DE ÎNCĂRCARE */
        .spinner { animation: rotate 1.5s linear infinite; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        /* FOOTER */
        footer { padding: 60px 5% 40px; background: var(--fildes); border-top: 1px solid var(--roz-accent); text-align: center; }
        .cui-info { font-family: 'Cinzel'; color: var(--text-muted); font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>

    <!-- ELEMENT DE NOTIFICARE (CUSTOM TOAST) -->
    <div id="customToast">
        <div class="toast-icon"><i class="fa-solid fa-circle-check" id="toastIcon"></i></div>
        <div class="toast-content">
            <h4 id="toastTitle">Solicitare Trimisă</h4>
            <p id="toastMessage">Rezervarea ta este în curs de procesare. Te contactăm curând.</p>
        </div>
    </div>

    <header class="site-header">
        <a href="index.html" class="brand-logo">COQUETE<span>.</span></a>
        <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> ÎNAPOI</a>
    </header>

    <main>
        <!-- HERO DESIGN EXCLUSIV -->
        <section class="booking-hero">
            <div class="hero-inside">
                <span>RÂNDUIALĂ & EXCLUSIVITATE</span>
                <h1>Rezervă o Sesiune Privată</h1>
            </div>
        </section>

        <!-- SECȚIUNE FORMULAR -->
        <section class="booking-wrapper">
            <div class="booking-card">
                <h2>Alege experiența ta de beauty</h2>
                
                <form id="bookingForm">
                    
                    <!-- PASUL 1: SERVICIUL -->
                    <div class="form-group">
                        <label for="bookingService">Serviciul Dorit</label>
                        <select id="bookingService" class="form-select" required>
                            <option value="" disabled selected>Selectează un serviciu exclusiv...</option>
                            <option value="Bridal Glow (Pachet Complet Mireasă)">Bridal Glow (Pachet Complet Mireasă)</option>
                            <option value="Sesiune Privată / Eveniment de Elită">Sesiune Privată / Eveniment de Elită</option>
                            <option value="Coquete Academy (Curs Automachiaj 1:1)">Coquete Academy (Curs Automachiaj 1:1)</option>
                            <option value="Masterclass de Perfecționare">Masterclass de Perfecționare</option>
                        </select>
                    </div>

                    <!-- PASUL 2: DATA & ORA -->
                    <div class="date-time-grid">
                        <div class="form-group">
                            <label for="bookingDate">Data Solicitată</label>
                            <!-- Blocăm datele din trecut prin JS -->
                            <input type="date" id="bookingDate" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label for="bookingTime">Intervalul Orar</label>
                            <select id="bookingTime" class="form-select" required>
                                <option value="" disabled selected>Alege o oră rânduită...</option>
                                <option value="09:00 - Sesiune Dimineață">09:00 - Sesiune Dimineață</option>
                                <option value="11:30 - Sesiune Amiază">11:30 - Sesiune Amiază</option>
                                <option value="14:00 - Sesiune După-amiază">14:00 - Sesiune După-amiază</option>
                                <option value="16:30 - Sesiune Seară">16:30 - Sesiune Seară</option>
                                <option value="19:00 - Sesiune Exclusivă">19:00 - Sesiune Exclusivă</option>
                            </select>
                        </div>
                    </div>

                    <!-- PASUL 3: DATE CONTACT -->
                    <div class="form-group">
                        <label for="customerName">Numele Tău Complet</label>
                        <input type="text" id="customerName" class="form-input" placeholder="Ex: Alexandra Sandu" required>
                    </div>

                    <div class="date-time-grid">
                        <div class="form-group">
                            <label for="customerPhone">Număr Telefon</label>
                            <input type="tel" id="customerPhone" class="form-input" placeholder="Ex: 0749 229 686" required>
                        </div>
                        <div class="form-group">
                            <label for="customerEmail">Adresă E-mail</label>
                            <input type="email" id="customerEmail" class="form-input" placeholder="Ex: contact@coquete.ro" required>
                        </div>
                    </div>

                    <!-- DETALII SUPLIMENTARE -->
                    <div class="form-group">
                        <label for="bookingNotes">Mențiuni Speciale / Detalii Eveniment</label>
                        <textarea id="bookingNotes" class="form-textarea" placeholder="Spune-ne mai multe despre tipul evenimentului, rochie, preferințe sau detalii relevante pentru stilul tău..."></textarea>
                    </div>

                    <!-- BUTON DE CONFIRMARE CU LOADER -->
                    <button type="submit" id="submitBtn" class="btn-submit-booking">
                        <span id="btnText">TRIMITE SOLICITAREA</span>
                        <i id="btnLoader" class="fa-solid fa-circle-notch spinner" style="display: none;"></i>
                    </button>

                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="cui-info">
            COQUETE BEAUTY STUDIO | SISTEM REZERVARE PRIVATĂ <br>
            TIHNĂ ȘI TIMP OPTIMIZAT MATEMATIC © 2026
        </div>
    </footer>

    <!-- LOGICA JAVASCRIPT: PRELUARE DATE + EXPONENTIAL BACKOFF + MAKE.COM INTEGRATION + CONVERSION TRACKING -->
    <script {nonce}>
        // Blocăm selecția datelor din trecut în calendar
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('bookingDate').setAttribute('min', today);

        const makeWebhookUrl = "https://hook.eu1.make.com/kl5zil3ff85l8o4i0t9inya4l2xphidd";

        // Funcția de afișare notificare custom
        function triggerNotification(title, message, success = true) {
            const toast = document.getElementById('customToast');
            const toastIcon = document.getElementById('toastIcon');
            const toastTitle = document.getElementById('toastTitle');
            const toastMessage = document.getElementById('toastMessage');

            toastTitle.innerText = title;
            toastMessage.innerText = message;

            if (success) {
                toastIcon.className = "fa-solid fa-circle-check";
                toastIcon.style.color = "var(--auriu)";
                toast.style.borderColor = "var(--auriu)";
            } else {
                toastIcon.className = "fa-solid fa-circle-exclamation";
                toastIcon.style.color = "#cc0000";
                toast.style.borderColor = "#cc0000";
            }

            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 5000);
        }

        // Trimitere Formular cu Retry / Exponential Backoff
        document.getElementById('bookingForm').onsubmit = async function(e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');

            // Stilizare buton pe Loading
            submitBtn.disabled = true;
            btnText.style.display = "none";
            btnLoader.style.display = "inline-block";

            // Structură Payload date
            const payload = {
                type: "rezervare_noua",
                studio: "Coquete Bianca Iacoboni",
                service: document.getElementById('bookingService').value,
                date: document.getElementById('bookingDate').value,
                time: document.getElementById('bookingTime').value,
                customer_name: document.getElementById('customerName').value,
                customer_phone: document.getElementById('customerPhone').value,
                customer_email: document.getElementById('customerEmail').value,
                notes: document.getElementById('bookingNotes').value || "Nu sunt mențiuni speciale.",
                timestamp: new Date().toISOString()
            };

            // Implementare Exponential Backoff (retries până la 5 ori cu timpi crescători)
            const sendRequestWithRetry = async (url, data, retries = 5, delay = 1000) => {
                try {
                    const response = await fetch(url, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(data)
                    });

                    if (response.ok) {
                        return true;
                    }
                    throw new Error("Eroare server");
                } catch (error) {
                    if (retries > 0) {
                        // Nu facem log în consolă conform guardrail-ului, ci așteptăm în liniște
                        await new Promise(resolve => setTimeout(resolve, delay));
                        return sendRequestWithRetry(url, data, retries - 1, delay * 2);
                    }
                    return false;
                }
            };

            const isSuccess = await sendRequestWithRetry(makeWebhookUrl, payload);

            if (isSuccess) {
                // 1. Notificare clientă în interfață
                triggerNotification(
                    "Solicitare Înregistrată", 
                    "Datele tale au fost trimise cu succes. Bianca te va contacta pentru confirmare în scurt timp! ✨", 
                    true
                );

                // 2. Declanșarea codului Google Ads Conversion tracking (AW-18106516696)
                if (typeof gtag !== 'undefined') {
                    gtag('event', 'conversion', {
                        'send_to': 'AW-18106516696/booking_success', // Schimbă eticheta dacă ai una specifică din Google Ads
                        'value': 1.0,
                        'currency': 'RON'
                    });
                }

                // Resetare formular
                document.getElementById('bookingForm').reset();
            } else {
                // Mesaj user-friendly în caz de eșec după cele 5 încercări de backoff
                triggerNotification(
                    "A apărut o eroare", 
                    "Conexiunea cu serverul de programări a fost întreruptă temporar. Te rugăm să ne contactezi direct pe WhatsApp pentru programare rapidă! 📲", 
                    false
                );
            }

            // Readucem butonul la starea normală
            submitBtn.disabled = false;
            btnText.style.display = "inline-block";
            btnLoader.style.display = "none";
        };
    </script>
</body>
</html>
