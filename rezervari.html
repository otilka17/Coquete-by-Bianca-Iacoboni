<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezervări Premium | Coquete</title>
    <style>
        /* Stilul de Lux inspirat de Ermes Italia */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Playfair Display', 'Segoe UI', serif;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)), 
                        url('https://images.unsplash.com/photo-1560066984-138dadb4c035?q=80&w=1920') no-repeat center center fixed;
            background-size: cover;
            color: #f4efe6; /* Crem elegant */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Cardul principal cu efect de blur pe fundal (Glassmorphism de lux) */
        .reservation-container {
            background: rgba(15, 15, 15, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.2); /* Margine fină aurie */
            padding: 40px;
            border-radius: 4px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            font-weight: 300;
            letter-spacing: 3px;
            color: #d4af37; /* Auriu regal */
            margin-bottom: 30px;
            text-transform: uppercase;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #f4efe6;
            opacity: 0.9;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 2px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #d4af37;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.2);
        }

        option {
            background: #111;
            color: #f4efe6;
        }

        textarea {
            resize: vertical;
            height: 80px;
        }

        /* Butonul de trimitere Premium */
        button {
            width: 100%;
            padding: 15px;
            background: #d4af37;
            border: none;
            color: #000;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            border-radius: 2px;
        }

        button:hover {
            background: #b8972f;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
            letter-spacing: 3px;
        }

        .status-message {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            display: none;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="reservation-container">
    <h2>Solicitare Rezervare</h2>
    
    <form id="reservationForm">
        <div class="form-group">
            <label for="customer_name">Nume Complet</label>
            <input type="text" id="customer_name" required placeholder="Ex: Otilia Salasan">
        </div>

        <div class="form-group">
            <label for="customer_phone">Număr Telefon</label>
            <input type="tel" id="customer_phone" required placeholder="Ex: 0749xxxxxx">
        </div>

        <div class="form-group">
            <label for="service">Serviciu Dorit</label>
            <select id="service" required>
                <option value="" disabled selected>Alege serviciul...</option>
                <option value="Sesiune Privată / Eveniment de Elită">Sesiune Privată / Eveniment de Elită</option>
                <option value="Consultanță de Brand Premium">Consultanță de Brand Premium</option>
                <option value="Experiență Gastronică Dedicată">Experiență Gastronică Dedicată</option>
            </select>
        </div>

        <div class="form-group">
            <label for="date">Data Solicitată</label>
            <input type="date" id="date" required>
        </div>

        <div class="form-group">
            <label for="time">Ora Dorită</label>
            <select id="time" required>
                <option value="" disabled selected>Alege intervalul...</option>
                <option value="10:00 - Sesiune de Dimineață">10:00 - Sesiune de Dimineață</option>
                <option value="14:00 - Sesiune După-amiază">14:00 - Sesiune După-amiază</option>
                <option value="18:00 - Experiență de Seară">18:00 - Experiență de Seară</option>
            </select>
        </div>

        <div class="form-group">
            <label for="notes">Mențiuni Speciale / Note</label>
            <textarea id="notes" placeholder="Dacă aveți preferințe sau detalii de transmis..."></textarea>
        </div>

        <button type="submit">Trimite Solicitarea</button>
        <div id="statusMessage" class="status-message"></div>
    </form>
</div>

<script>
    document.getElementById('reservationForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const button = e.target.querySelector('button');
        const status = document.getElementById('statusMessage');
        
        button.disabled = true;
        button.innerText = "Se trimite...";

        const formData = {
            customer_name: document.getElementById('customer_name').value,
            customer_phone: document.getElementById('customer_phone').value,
            service: document.getElementById('service').value,
            date: document.getElementById('date').value,
            time: document.getElementById('time').value,
            notes: document.getElementById('notes').value,
            timestamp: new Date().toLocaleString('ro-RO')
        };

        // Webhook-ul tău oficial din Make introdus corect:
        const webhookUrl = 'https://hook.eu1.make.com/kl5zil3ff85l8o4i0t9inya4l2xphidd';

        try {
            const response = await fetch(webhookUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            });

            if (response.ok) {
                status.style.color = "#d4af37";
                status.innerText = "Solicitarea a fost transmisă cu tihnă. Veți primi confirmarea pe WhatsApp! ✨";
                status.style.display = "block";
                e.target.reset();
            } else {
                throw new Error();
            }
        } catch (error) {
            status.style.color = "#ff4d4d";
            status.innerText = "A apărut o mică eroare. Vă rugăm să reîncercați.";
            status.style.display = "block";
        } finally {
            button.disabled = false;
            button.innerText = "Trimite Solicitarea";
        }
    });
</script>

</body>
</html>
