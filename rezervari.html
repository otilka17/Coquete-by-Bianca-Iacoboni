<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezervări Coquete</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .form-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            text-align: center;
            color: #111;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #666;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #111;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #333;
        }
        .status {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Programare Nouă</h2>
    
    <form id="bookingForm">
        <div class="form-group">
            <label for="customer_name">Nume complet</label>
            <input type="text" id="customer_name" required placeholder="Nume și Prenume">
        </div>

        <div class="form-group">
            <label for="customer_phone">Număr telefon</label>
            <input type="tel" id="customer_phone" required placeholder="07xx xxx xxx">
        </div>

        <div class="form-group">
            <label for="service">Serviciu</label>
            <select id="service" required>
                <option value="" disabled selected>Alege serviciul...</option>
                <option value="Sesiune Privată / Eveniment de Elită">Sesiune Privată / Eveniment de Elită</option>
                <option value="Coquete Academy — Curs Automachiaj 1:1">Coquete Academy — Curs Automachiaj 1:1</option>
                <option value="Bridal Glow (Pachet Complet Mireasă Premium)">Bridal Glow (Pachet Complet Mireasă Premium)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="date">Data programării</label>
            <input type="date" id="date" required>
        </div>

        <div class="form-group">
            <label for="time">Ora</label>
            <select id="time" required>
                <option value="" disabled selected>Alege intervalul...</option>
                <option value="10:00 - Sesiune de Dimineață">10:00 - Sesiune de Dimineață</option>
                <option value="14:00 - Sesiune După-amiază">14:00 - Sesiune După-amiază</option>
                <option value="18:00 - Experiență de Seară">18:00 - Experiență de Seară</option>
            </select>
        </div>

        <div class="form-group">
            <label for="notes">Mențiuni speciale</label>
            <textarea id="notes" placeholder="Detalii suplimentare..."></textarea>
        </div>

        <button type="submit">Trimite Programarea</button>
        <div id="status" class="status"></div>
    </form>
</div>

<script>
    document.getElementById('bookingForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const btn = e.target.querySelector('button');
        const statusBox = document.getElementById('status');
        
        btn.disabled = true;
        btn.innerText = "Se trimite...";

        const data = {
            customer_name: document.getElementById('customer_name').value,
            customer_phone: document.getElementById('customer_phone').value,
            service: document.getElementById('service').value,
            date: document.getElementById('date').value,
            time: document.getElementById('time').value,
            notes: document.getElementById('notes').value,
            timestamp: new Date().toLocaleString('ro-RO')
        };

        // Webhook-ul tău funcțional
        const url = 'https://hook.eu1.make.com/kl5zil3ff85l8o4i0t9inya4l2xphidd';

        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                statusBox.style.color = "green";
                statusBox.innerText = "Programarea a fost trimisă cu succes!";
                statusBox.style.display = "block";
                e.target.reset();
            } else {
                throw new Error();
            }
        } catch (err) {
            statusBox.style.color = "red";
            statusBox.innerText = "Eroare la trimitere. Încearcă din nou.";
            statusBox.style.display = "block";
        } finally {
            btn.disabled = false;
            btn.innerText = "Trimite Programarea";
        }
    });
</script>

</body>
</html>
